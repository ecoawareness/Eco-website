<!-- ── Production integration shim ─────────────────────────────────────
     1. Routes EcoBot through the real /api/chat backend instead of the
        sandbox-only window.claude.complete helper.
     2. The prototype ships its own demo auth screen at #signin/#signup; in
        production we use the real static /signin.html, so funnel those
        routes back to it (and clear the Supabase session on sign out).
     ──────────────────────────────────────────────────────────────────── -->
<script>
(function () {
  var SUPABASE_URL = 'https://nqvhxjsryatqgfvtjbki.supabase.co';
  var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xdmh4anNyeWF0cWdmdnRqYmtpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNDYxMDAsImV4cCI6MjA4ODYyMjEwMH0.HrnrIq5bK3FhxmHaLxWPIG0nD-CI-3ReHCoO5RL1c3M';
  var sb = (window.supabase && window.supabase.createClient) ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

  // EcoBot -> real backend.
  window.claude = {
    complete: async function (prompt) {
      var r = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: [{ role: 'user', content: String(prompt) }] })
      });
      if (!r.ok) throw new Error('chat upstream ' + r.status);
      var d = await r.json();
      return (d && d.reply) || '';
    }
  };

  // Keep the SPA's demo auth out of production.
  function guard() {
    var h = (window.location.hash || '').replace('#', '');
    if (h === 'signin' || h === 'signup') {
      if (sb) { try { sb.auth.signOut(); } catch (e) {} }
      window.location.href = '/' + (h === 'signup' ? 'signup' : 'signin') + '.html';
      return;
    }
    if (!h) { window.location.replace(window.location.pathname + '#dashboard'); }
  }
  window.addEventListener('hashchange', guard);
  guard();
})();
</script>
