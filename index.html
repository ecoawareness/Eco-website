<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoAwareness.qa - Empowering Qatar's Youth</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        emerald: {
                            50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7',
                            400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857',
                            800: '#065f46', 900: '#064e3b', 950: '#022c22',
                        },
                    },
                    animation: {
                        'spin-slow': 'spin 12s linear infinite',
                        'spin-reverse': 'spin-reverse 15s linear infinite',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-white transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- INTERNAL ICON SYSTEM (Fixed Syntax) ---
        const Icon = ({ path, size = 24, className = "" }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
            >
                {path}
            </svg>
        );

        const Icons = {
            Globe: <><circle cx="12" cy="12" r="10" /><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></>,
            Menu: <path d="M4 12h16M4 6h16M4 18h16" />,
            X: <path d="M18 6 6 18M6 6l12 12" />,
            Sun: <><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" /></>,
            Moon: <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />,
            ArrowRight: <path d="M5 12h14M12 5l7 7-7 7" />,
            Bot: <><path d="M12 8V4H8" /><rect width="16" height="12" x="4" y="8" rx="2" /><path d="M2 14h2M20 14h2M15 13v2M9 13v2" /></>,
            Sparkles: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />,
            Mail: <><rect width="20" height="16" x="2" y="4" rx="2" /><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" /></>,
            Instagram: <><rect width="20" height="20" x="2" y="2" rx="5" ry="5" /><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37zM17.5 6.5h.01" /></>,
            Brain: <><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z" /><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z" /></>,
            Refresh: <><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" /><path d="M21 3v5h-5" /></>,
            Lightbulb: <><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-1 1.5-2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5" /><path d="M9 18h6" /><path d="M10 22h4" /></>,
            Leaf: <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 1 8 1.55 1.25 3 1.75 4 2-3.19 2.11-4.18 2.33-8 1-2 5.25-9.75 8-11 8z" />,
            Check: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><path d="M22 4 12 14.01l-3-3" /></>,
            Alert: <><circle cx="12" cy="12" r="10" /><path d="M12 8v4M12 16h.01" /></>,
            Calendar: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2" /><path d="M16 2v4M8 2v4M3 10h18" /></>,
            Send: <><path d="m22 2-7 20-4-9-9-4Z" /><path d="M22 2 11 13" /></>,
            Award: <><circle cx="12" cy="8" r="7" /><path d="M8.21 13.89 7 23l5-3 5 3-1.21-9.12" /></>
        };

        // --- DATA ---
        const DATA = {
          leadership: [
            { id: "mohammed", name: "Mohammed Elfatih", role: "Founder & CEO", image: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=400&h=400&fit=crop", bio: "As the visionary founder, Mohammed orchestrates the strategic direction of Qatar's leading youth climate initiative." },
            { id: "mohammadfiras", name: "Mohammed Firas", role: "Co-Founder & Media", image: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=400&fit=crop", bio: "Mohammed Firas leads the digital narrative, ensuring the message of sustainability resonates with youth." },
            { id: "mohamedmishal", name: "Mohammed Mishal", role: "Co-Founder & Ideas", image: "https://images.unsplash.com/photo-1519345182560-3f2917c472ef?w=400&h=400&fit=crop", bio: "The creative force behind our curriculum, transforming complex data into engaging learning experiences." },
            { id: "ahmed", name: "Ahmed", role: "Co-Founder & Innovation", image: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=400&h=400&fit=crop", bio: "Ahmed spearheads the integration of technology to gamify the learning experience." }
          ],
          members: [
            { name: "Mariam", image: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=400&h=400&fit=crop" }, 
            { name: "Fatima", image: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400&h=400&fit=crop" }, 
            { name: "Henin", image: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400&h=400&fit=crop" }, 
            { name: "Mossab", image: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400&h=400&fit=crop" }, 
            { name: "Mohamed A", image: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=400&fit=crop" },
            { name: "Faisal", image: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=400&h=400&fit=crop" },
            { name: "Amna", image: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=400&h=400&fit=crop" }
          ],
          achievements: [
            { id: 1, type: "Workshops", title: "Empower 2025 Workshop", date: "2025", image: "https://images.unsplash.com/photo-1544531696-282370099b8f?w=600&fit=crop", desc: "Led an interactive sustainability workshop for youth delegates." },
            { id: 2, type: "Media", title: "Featured in Doha News", date: "Dec 2023", image: "https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=600&fit=crop", desc: "Our initiative was highlighted as a leading youth movement." },
            { id: 3, type: "AI", title: "EcoBot AI", date: "Coming Soon", image: "https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=600&fit=crop", desc: "Our AI recycling assistant is currently in development." }
          ]
        };

        const TRANSLATIONS = {
            en: {
                nav: { home: "Home", accomplishments: "Accomplishments", contact: "Contact" },
                hero: { headline: "Empowering Qatar's Youth for a Sustainable Future.", subhead: "A youth-led initiative increasing climate awareness for high school & university students in Qatar." },
                team: { title: "Founders & Leadership", view_bio: "Read Bio", volunteers_title: "Active Members", join_us: "Join Us" },
                contact: { title: "Get in Touch", subtitle: "We'd love to hear from you." }
            },
            ar: {
                nav: { home: "الرئيسية", accomplishments: "الإنجازات", contact: "تواصل معنا" },
                hero: { headline: "تمكين شباب قطر لمستقبل مستدام.", subhead: "مبادرة شبابية لزيادة الوعي المناخي لطلاب المدارس الثانوية والجامعات في قطر." },
                team: { title: "المؤسسون والقيادة", view_bio: "اقرأ المزيد", volunteers_title: "الأعضاء الفاعلين", join_us: "انضم إلينا" },
                contact: { title: "تواصل معنا", subtitle: "نحب أن نسمع منك." }
            }
        };

        // --- COMPONENTS ---

        const TechGlobe = () => (
            <div className="relative w-72 h-72 md:w-96 md:h-96 flex items-center justify-center">
                <div className="absolute inset-0 border border-emerald-500/20 rounded-full animate-spin-slow"></div>
                <div className="absolute inset-4 border border-dashed border-emerald-500/20 rounded-full animate-spin-reverse"></div>
                <div className="absolute inset-12 bg-emerald-500/5 rounded-full blur-2xl animate-pulse"></div>
                <div className="relative z-10 text-center">
                    <h2 className="text-3xl md:text-4xl font-black text-slate-800 dark:text-white leading-[0.9] mb-1">
                        NATIONAL<br /><span className="text-emerald-600 dark:text-emerald-500">VISION</span>
                    </h2>
                    <h1 className="text-7xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-br from-emerald-600 to-teal-800 dark:from-emerald-400 dark:to-teal-200">2030</h1>
                </div>
            </div>
        );

        const AIIdeaGenerator = () => {
            const [prompt, setPrompt] = useState('');
            const [idea, setIdea] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const generateIdea = async () => {
                if (!prompt.trim()) return;
                setLoading(true);
                setError('');
                setIdea(null);
                
                // IMPORTANT: Insert API Key here
                const apiKey = ""; 

                if (!apiKey) {
                    setError("Please add your Gemini API Key in the code (line 591).");
                    setLoading(false);
                    return;
                }

                try {
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `Generate a sustainability mini-project for students in Qatar about: "${prompt}". JSON format: {"title":"", "objective":"", "steps":["","",""], "visionAlignment":""}` }] }],
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        }
                    );
                    const data = await response.json();
                    const content = JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text || "{}");
                    setIdea(content);
                } catch (err) {
                    setError("Failed to generate. Check console/network.");
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="py-12 px-4 max-w-4xl mx-auto">
                    <div className="bg-gradient-to-br from-emerald-900 via-slate-900 to-emerald-950 rounded-3xl p-8 text-white relative overflow-hidden">
                        <div className="relative z-10">
                            <h2 className="text-2xl font-bold flex items-center gap-2 mb-4">
                                <Icon path={Icons.Sparkles} className="text-emerald-400" /> Eco-Innovation Lab
                            </h2>
                            <p className="mb-6 text-emerald-100/80">Enter a topic to generate a QNV 2030 aligned project.</p>
                            <div className="flex gap-3 mb-6">
                                <input 
                                    type="text" 
                                    value={prompt} 
                                    onChange={(e) => setPrompt(e.target.value)} 
                                    className="flex-grow p-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder:text-white/50"
                                    placeholder="e.g. Food Waste"
                                />
                                <button onClick={generateIdea} disabled={loading} className="px-6 py-3 bg-emerald-600 rounded-xl font-bold hover:bg-emerald-500 disabled:opacity-50">
                                    {loading ? "..." : "Generate"}
                                </button>
                            </div>
                            {error && <div className="text-red-300 bg-red-900/20 p-3 rounded-lg mb-4">{error}</div>}
                            {idea && (
                                <div className="bg-white/10 p-6 rounded-xl border border-white/10 animate-in fade-in">
                                    <h3 className="text-xl font-bold text-emerald-300 mb-2">{idea.title}</h3>
                                    <p className="italic text-slate-300 mb-4">{idea.objective}</p>
                                    <ul className="space-y-2 mb-4">
                                        {idea.steps?.map((s, i) => <li key={i} className="text-sm flex gap-2"><span className="text-emerald-400">{i+1}.</span> {s}</li>)}
                                    </ul>
                                    <div className="text-xs bg-emerald-900/50 p-3 rounded border border-emerald-500/30">
                                        <strong>QNV 2030:</strong> {idea.visionAlignment}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const QuizSection = () => {
             const [q, setQ] = useState(null);
             const [loading, setLoading] = useState(false);
             const [showRes, setShowRes] = useState(false);

             const fetchQ = async () => {
                setLoading(true);
                setShowRes(false);
                setQ(null);
                
                const apiKey = ""; // Insert Key Here as well if needed, or reuse variable

                if (!apiKey) {
                    setLoading(false);
                    return; 
                }

                try {
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `Generate 1 multiple choice question about Qatar sustainability. JSON: {"question":"", "options":["","","",""], "correctIndex":0, "explanation":""}` }] }],
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        }
                    );
                    const data = await response.json();
                    setQ(JSON.parse(data.candidates[0].content.parts[0].text));
                } catch(e) { console.error(e); }
                finally { setLoading(false); }
             };

             useEffect(() => { fetchQ(); }, []);

             return (
                <div className="max-w-4xl mx-auto px-4 py-8">
                    <div className="bg-white dark:bg-slate-800 rounded-3xl p-8 border border-slate-200 dark:border-slate-700 shadow-lg">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-bold flex items-center gap-2">
                                <Icon path={Icons.Brain} className="text-emerald-500" /> AI Quiz
                            </h2>
                            <button onClick={fetchQ} disabled={loading} className="text-sm text-slate-500 flex gap-1 items-center hover:text-emerald-500">
                                <Icon path={Icons.Refresh} size={16} /> Skip
                            </button>
                        </div>
                        {loading && <div className="text-center py-8 text-slate-400">Loading Question...</div>}
                        {!loading && !q && <div className="text-center py-8 text-slate-400">Add API Key to load quiz.</div>}
                        {q && (
                            <div>
                                <h3 className="text-xl font-bold mb-6">{q.question}</h3>
                                <div className="grid gap-3 mb-4">
                                    {q.options.map((opt, i) => (
                                        <button 
                                            key={i} 
                                            disabled={showRes}
                                            onClick={() => setShowRes(true)}
                                            className={`p-4 rounded-xl border-2 text-left transition-colors ${
                                                showRes 
                                                ? (i === q.correctIndex ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-900/20' : 'border-slate-200 opacity-50')
                                                : 'border-slate-200 hover:border-emerald-500'
                                            }`}
                                        >
                                            {opt}
                                        </button>
                                    ))}
                                </div>
                                {showRes && (
                                    <div className="bg-emerald-50 dark:bg-emerald-900/20 p-4 rounded-xl text-sm">
                                        <strong>Explanation:</strong> {q.explanation}
                                        <br/>
                                        <button onClick={fetchQ} className="mt-2 text-emerald-600 font-bold">Next Question</button>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
             );
        };

        const App = () => {
            const [lang, setLang] = useState('en');
            const [page, setPage] = useState('home');
            const [theme, setTheme] = useState('light');
            const [selectedBio, setSelectedBio] = useState(null);
            
            const t = TRANSLATIONS[lang];

            const toggleTheme = () => {
                const newTheme = theme === 'light' ? 'dark' : 'light';
                setTheme(newTheme);
                if (newTheme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            };

            return (
                <div className="min-h-screen">
                    {/* NAV */}
                    <nav className="fixed w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setPage('home')}>
                                <div className="bg-emerald-600 text-white p-1 rounded-full"><Icon path={Icons.Globe} size={20} /></div>
                                <span className="font-bold text-xl">EcoAwareness.qa</span>
                            </div>
                            <div className="hidden md:flex items-center gap-6">
                                <button onClick={() => setPage('home')} className={`text-sm font-medium ${page==='home'?'text-emerald-600':'text-slate-600 dark:text-slate-300'}`}>{t.nav.home}</button>
                                <button onClick={() => setPage('accomplishments')} className={`text-sm font-medium ${page==='accomplishments'?'text-emerald-600':'text-slate-600 dark:text-slate-300'}`}>{t.nav.accomplishments}</button>
                                <button onClick={() => setPage('contact')} className={`text-sm font-medium ${page==='contact'?'text-emerald-600':'text-slate-600 dark:text-slate-300'}`}>{t.nav.contact}</button>
                                <div className="border-l pl-4 border-slate-300 flex gap-2">
                                    <button onClick={() => setLang(l => l==='en'?'ar':'en')} className="font-bold text-xs p-2 rounded bg-slate-100 dark:bg-slate-800">{lang.toUpperCase()}</button>
                                    <button onClick={toggleTheme} className="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-800">
                                        <Icon path={theme==='light' ? Icons.Moon : Icons.Sun} size={18} />
                                    </button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="pt-16">
                        {page === 'home' && (
                            <div className="animate-in fade-in">
                                {/* HERO */}
                                <section className="max-w-7xl mx-auto px-4 py-20 flex flex-col md:flex-row items-center">
                                    <div className="md:w-1/2 text-center md:text-left">
                                        <span className="inline-block px-3 py-1 mb-4 text-xs font-bold text-emerald-600 bg-emerald-100 rounded-full">YOUTH LED • QATAR BASED</span>
                                        <h1 className="text-5xl font-extrabold mb-6 leading-tight">{t.hero.headline}</h1>
                                        <p className="text-xl text-slate-600 dark:text-slate-400 mb-8">{t.hero.subhead}</p>
                                        <div className="flex gap-4 justify-center md:justify-start">
                                            <button onClick={() => setPage('accomplishments')} className="px-8 py-3 bg-emerald-600 text-white rounded-lg font-bold hover:bg-emerald-700 flex items-center gap-2">
                                                {t.nav.accomplishments} <Icon path={Icons.ArrowRight} size={18} />
                                            </button>
                                        </div>
                                    </div>
                                    <div className="md:w-1/2 flex justify-center mt-12 md:mt-0">
                                        <TechGlobe />
                                    </div>
                                </section>
                                
                                <AIIdeaGenerator />
                                <QuizSection />

                                {/* TEAM */}
                                <section className="py-20 bg-slate-50 dark:bg-slate-800/50">
                                    <div className="max-w-7xl mx-auto px-4">
                                        <h2 className="text-3xl font-bold text-center mb-12">{t.team.title}</h2>
                                        <div className="grid md:grid-cols-4 gap-6">
                                            {DATA.leadership.map(m => (
                                                <div key={m.id} className="bg-white dark:bg-slate-900 rounded-xl overflow-hidden border border-slate-200 dark:border-slate-800 hover:border-emerald-500 transition-colors">
                                                    <img src={m.image} alt={m.name} className="w-full aspect-square object-cover" />
                                                    <div className="p-4">
                                                        <h3 className="font-bold">{m.name}</h3>
                                                        <p className="text-emerald-600 text-sm mb-2">{m.role}</p>
                                                        <button onClick={() => setSelectedBio(m)} className="text-xs font-bold flex items-center gap-1 text-slate-500 hover:text-emerald-600">
                                                            {t.team.view_bio} <Icon path={Icons.ArrowRight} size={12} />
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </section>
                            </div>
                        )}

                        {page === 'accomplishments' && (
                            <div className="max-w-7xl mx-auto px-4 py-16 animate-in fade-in">
                                <h1 className="text-4xl font-bold mb-12">Our Impact</h1>
                                <div className="grid md:grid-cols-3 gap-8">
                                    <div className="md:col-span-2 space-y-6">
                                        {DATA.achievements.map(item => (
                                            <div key={item.id} className="flex flex-col md:flex-row bg-white dark:bg-slate-800 rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-700 shadow-sm">
                                                <img src={item.image} className="md:w-48 object-cover h-48 md:h-auto" />
                                                <div className="p-6">
                                                    <span className="text-xs font-bold text-emerald-600 uppercase">{item.type}</span>
                                                    <h3 className="text-xl font-bold mt-1 mb-2">{item.title}</h3>
                                                    <p className="text-slate-600 dark:text-slate-400 text-sm">{item.desc}</p>
                                                    <div className="mt-4 flex items-center gap-2 text-xs text-slate-500">
                                                        <Icon path={Icons.Calendar} size={14} /> {item.date}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="space-y-6">
                                        <div className="bg-emerald-50 dark:bg-emerald-900/20 p-6 rounded-2xl border border-emerald-100 dark:border-emerald-800">
                                            <h3 className="font-bold mb-4 flex items-center gap-2"><Icon path={Icons.Award} size={20}/> Milestones</h3>
                                            <ul className="space-y-3 text-sm">
                                                <li className="flex gap-2"><div className="w-2 h-2 mt-1.5 rounded-full bg-emerald-500"></div> AI Integration</li>
                                                <li className="flex gap-2"><div className="w-2 h-2 mt-1.5 rounded-full bg-emerald-500"></div> University Chapters</li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {page === 'contact' && (
                            <div className="max-w-4xl mx-auto px-4 py-20 text-center animate-in fade-in">
                                <h1 className="text-4xl font-bold mb-4">{t.contact.title}</h1>
                                <p className="text-slate-600 dark:text-slate-400 mb-12">{t.contact.subtitle}</p>
                                <div className="grid md:grid-cols-2 gap-8">
                                    <div className="bg-white dark:bg-slate-800 p-8 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-xl flex flex-col items-center hover:scale-105 transition-transform">
                                        <div className="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 mb-6"><Icon path={Icons.Mail} size={32} /></div>
                                        <h3 className="text-xl font-bold mb-4">Email</h3>
                                        <a href="mailto:ecoawarenessme@gmail.com" className="px-6 py-3 bg-emerald-600 text-white rounded-xl font-bold flex items-center gap-2">
                                            <Icon path={Icons.Send} size={18} /> Email Us
                                        </a>
                                    </div>
                                    <div className="bg-white dark:bg-slate-800 p-8 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-xl flex flex-col items-center hover:scale-105 transition-transform">
                                        <div className="w-16 h-16 bg-pink-100 rounded-full flex items-center justify-center text-pink-600 mb-6"><Icon path={Icons.Instagram} size={32} /></div>
                                        <h3 className="text-xl font-bold mb-4">Instagram</h3>
                                        <a href="https://instagram.com" className="px-6 py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-xl font-bold flex items-center gap-2">
                                            <Icon path={Icons.Instagram} size={18} /> Follow Us
                                        </a>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* BIO MODAL */}
                    {selectedBio && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm" onClick={() => setSelectedBio(null)}>
                            <div className="bg-white dark:bg-slate-900 max-w-lg w-full rounded-2xl p-8 relative shadow-2xl animate-in zoom-in-95" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setSelectedBio(null)} className="absolute top-4 right-4 p-2 bg-slate-100 dark:bg-slate-800 rounded-full"><Icon path={Icons.X} size={20} /></button>
                                <div className="flex items-center gap-4 mb-6">
                                    <img src={selectedBio.image} className="w-20 h-20 rounded-full object-cover border-2 border-emerald-500" />
                                    <div>
                                        <h3 className="text-2xl font-bold">{selectedBio.name}</h3>
                                        <p className="text-emerald-600 font-medium">{selectedBio.role}</p>
                                    </div>
                                </div>
                                <p className="text-slate-600 dark:text-slate-300 leading-relaxed">{selectedBio.bio}</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
