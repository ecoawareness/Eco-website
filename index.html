        const AnimatedCounter = ({ target, label, suffix = "" }) => {
            const [count, setCount] = useState(0);
            const ref = useRef(null);
            
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting) {
                        let start = null;
                        const duration = 2000;
                        const step = (timestamp) => {
                            if (!start) start = timestamp;
                            const progress = Math.min((timestamp - start) / duration, 1);
                            const easeOutQuart = 1 - Math.pow(1 - progress, 4);
                            setCount(Math.floor(easeOutQuart * target));
                            if (progress < 1) window.requestAnimationFrame(step);
                        };
                        window.requestAnimationFrame(step);
                        observer.disconnect();
                    }
                }, { threshold: 0.5 });
                
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, [target]);

                            <span className="inline-block px-5 py-2 mb-6 text-sm font-black text-emerald-400 bg-emerald-900/30 rounded-full tracking-wider uppercase shadow-sm border border-emerald-500/20">Why We Exist</span>
                            <h1 className="text-5xl md:text-7xl font-black mb-8 tracking-tight text-white">{t.opportunities.title}</h1>
                            <p className="text-2xl text-slate-400 max-w-4xl mx-auto leading-relaxed font-light">
                                {t.opportunities.subtitle}
                            </p>
                        </div>

                        <div className="grid md:grid-cols-2 gap-12 mb-20">
                            {/* Institutions Card */}
                            <div className="bg-gradient-to-br from-emerald-800 via-teal-900 to-slate-900 text-white p-12 rounded-[3rem] shadow-2xl flex flex-col justify-center relative overflow-hidden group hover:scale-[1.02] transition-transform duration-500 ease-apple border border-white/10">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-emerald-500/20 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
                                <div className="relative z-10">
                                    <div className="w-16 h-16 bg-white/10 backdrop-blur-md rounded-[2rem] flex items-center justify-center text-emerald-300 mb-8 border border-white/20">
                                        <Icon path={Icons.Briefcase} size={32} />
                                    </div>
                                    <h2 className="text-3xl font-black mb-6">{t.opportunities.institutions_title}</h2>
                                    <p className="text-lg text-emerald-50/80 leading-relaxed font-light mb-10">
                                        {t.opportunities.institutions_desc}
                                    </p>
                                    <button onClick={() => changePage('contact')} className="px-8 py-4 bg-white text-emerald-900 rounded-full font-bold text-lg flex items-center gap-3 shadow-xl hover:bg-emerald-50 active:scale-95 transition-all duration-300 ease-apple w-max">
                                        {t.opportunities.institutions_btn} <Icon path={Icons.ArrowRight} size={20} />
                                    </button>
                                </div>
                            </div>

                            {/* Opportunities Board */}
                            <div className="bg-white/5 backdrop-blur-xl p-10 md:p-12 rounded-[3rem] shadow-2xl border border-white/10 flex flex-col hover:scale-[1.02] transition-transform duration-500 ease-apple">
                                <div className="flex items-center gap-4 mb-8">
                                    <div className="w-16 h-16 bg-blue-500/20 rounded-[2rem] flex items-center justify-center text-blue-400 border border-blue-500/30">
                                        <Icon path={Icons.Target} size={32} />
                                    </div>
                                    <h2 className="text-3xl font-black leading-tight text-white">{t.opportunities.board_title}</h2>
                                </div>
                                <p className="text-slate-400 mb-8 text-lg font-light">
                                    {t.opportunities.board_desc}
                                </p>
                                
                                <div className="space-y-4 flex-grow">
                                    {STATIC_OPPORTUNITIES_BOARD.map((opp, idx) => (
                                        <div key={idx} className="bg-white/5 p-5 rounded-2xl border border-white/10 shadow-sm flex items-center justify-between group hover:border-emerald-500/50 transition-colors duration-300 cursor-pointer">
                                            <div>
                                                <h4 className="font-bold text-lg text-white group-hover:text-emerald-400 transition-colors">{opp.title}</h4>
                                                <p className="text-sm text-slate-400 mt-1">{opp.org} • {opp.type}</p>
                                            </div>
                                            <span className="px-3 py-1 bg-slate-800 text-slate-300 border border-white/10 text-xs font-bold rounded-full whitespace-nowrap">
                                                {opp.date}
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                  )}

                  {currentPage === 'contact' && (
                    <div className="pt-32 pb-24 px-4 max-w-4xl mx-auto text-center">
                      <h1 className="text-5xl md:text-7xl font-black mb-8 text-white">{t.contact.title}</h1>
                      <p className="text-2xl text-slate-400 mb-20 max-w-2xl mx-auto leading-relaxed font-light">{t.contact.subtitle}</p>
                      
                      <div className="grid md:grid-cols-2 gap-10">
                          <div className="bg-white/5 backdrop-blur-xl p-12 rounded-[3rem] border border-white/10 shadow-2xl flex flex-col items-center hover:scale-105 active:scale-95 transition-all duration-500 ease-apple group">
                              <div className="w-24 h-24 bg-emerald-500/20 rounded-[2.5rem] flex items-center justify-center text-emerald-400 mb-8 group-hover:-translate-y-2 group-hover:shadow-[0_0_20px_rgba(16,185,129,0.4)] transition-all duration-500 ease-apple"><Icon path={Icons.Mail} size={40} /></div>
                              <h3 className="text-3xl font-black mb-8 text-white">Email Us</h3>
                              <a href="mailto:ecoawarenessme@gmail.com" className="px-8 py-5 bg-emerald-600 text-white rounded-full font-bold text-lg flex items-center gap-3 shadow-lg hover:shadow-[0_0_20px_rgba(16,185,129,0.4)] transition-shadow w-full justify-center">
                                  <Icon path={Icons.Send} size={20} /> Contact Email
                              </a>
                          </div>
                          <div className="bg-white/5 backdrop-blur-xl p-12 rounded-[3rem] border border-white/10 shadow-2xl flex flex-col items-center hover:scale-105 active:scale-95 transition-all duration-500 ease-apple group">
                              <div className="w-24 h-24 bg-pink-500/20 rounded-[2.5rem] flex items-center justify-center text-pink-400 mb-8 group-hover:-translate-y-2 group-hover:shadow-[0_0_20px_rgba(236,72,153,0.4)] transition-all duration-500 ease-apple"><Icon path={Icons.Instagram} size={40} /></div>
                              <h3 className="text-3xl font-black mb-8 text-white">Instagram</h3>
                              <a href="https://www.instagram.com/ecoawareness.qa/" target="_blank" rel="noreferrer" className="px-8 py-5 bg-gradient-to-r from-purple-500 via-pink-500 to-orange-500 text-white rounded-full font-bold text-lg flex items-center gap-3 shadow-lg hover:shadow-[0_0_20px_rgba(236,72,153,0.4)] transition-shadow w-full justify-center">
                                  <Icon path={Icons.Instagram} size={20} /> @ecoawareness.qa
                              </a>
                          </div>
                      </div>
                    </div>
                  )}

                  {/* 6. CLEAN FOOTER */}
                  {currentPage === 'home' && <Footer changePage={changePage} />}

                </div>
              </main>

              {/* CLEAN FOOTER FOR OTHER PAGES */}
              {currentPage !== 'home' && <Footer changePage={changePage} />}

              {/* 6. THE HIDDEN PLEDGE MODAL (Moved outside transform wrapper) */}
              <div className={`fixed inset-0 z-[9999] flex justify-center items-center p-4 bg-black/60 backdrop-blur-[8px] transition-opacity duration-300 ease-in-out ${showPledgeModal ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}>
                  <div className={`bg-slate-900 backdrop-blur-2xl p-10 md:p-12 rounded-[3rem] shadow-2xl max-w-md w-full text-center border border-white/20 transition-transform duration-300 ease-in-out ${showPledgeModal ? 'scale-100' : 'scale-[0.95]'}`}>
                      <div className="w-20 h-20 bg-emerald-900/40 text-emerald-400 rounded-[2rem] flex items-center justify-center mx-auto mb-8 shadow-inner border border-emerald-500/20">
                          <Icon path={Icons.CheckCircle2} size={40} />
                      </div>
                      <h3 className="text-3xl font-black mb-4 text-white">Pledge Accepted!</h3>
                      <p className="text-lg text-slate-400 mb-10 leading-relaxed font-light">
                          Thank you for joining the movement for a sustainable future. Together, we can make a difference.
                      </p>
                      <button 
                          id="closeModal"
                          onClick={() => setShowPledgeModal(false)} 
                          className="w-full py-4 bg-white/10 text-white font-bold text-lg rounded-full hover:bg-emerald-500 active:scale-95 transition-all duration-300 ease-apple shadow-lg"
                      >
                          Close
                      </button>
                  </div>
              </div>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
