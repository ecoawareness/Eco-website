        // --- COMPONENTS ---

        const AIIdeaGenerator = () => {
          const [prompt, setPrompt] = useState('');
          const [idea, setIdea] = useState(null);
          const [loading, setLoading] = useState(false);
          const [error, setError] = useState('');

          const generateIdea = async () => {
            if (!prompt.trim()) return;
            
            setLoading(true);
            setError('');
            setIdea(null);
            
            // --- IMPORTANT: INSERT YOUR KEY HERE ---
            const apiKey = ""; // <--- INSERT YOUR GEMINI API KEY HERE
            
            if (!apiKey) {
                setError("API Key missing in code. Please add your key to index.html line 208.");
                setLoading(false);
                return;
            }

            try {
              const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    contents: [{ 
                      parts: [{ 
                        text: `Act as a sustainability expert for a youth organization in Qatar. Generate a creative, actionable "Mini-Project" idea based on this topic: "${prompt}". 
                        The output should be formatted as JSON with keys: "title", "objective", "steps" (an array of 3 short strings), and "visionAlignment" (how it aligns with QNV 2030).
                        Keep it short, inspiring, and feasible for students.` 
                      }] 
                    }],
                    generationConfig: { responseMimeType: "application/json" }
                  })
                }
              );
              
              if (!response.ok) throw new Error("API Error");
              const data = await response.json();
              const content = JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text || "{}");
              setIdea(content);
            } catch (err) {
              console.error(err);
              setError("Unable to generate ideas right now. Please check your API key.");
            } finally {
              setLoading(false);
            }
          };

          return (
            <section className="py-12 px-4 max-w-4xl mx-auto">
              <div className="bg-gradient-to-br from-emerald-900 via-slate-900 to-emerald-950 rounded-3xl p-8 md:p-12 shadow-2xl border border-emerald-500/30 relative overflow-hidden text-white">

                    </div>

                      Eco-Innovation Lab ✨
                    </h2>
                  </div>
                  
                  <p className="text-emerald-100/80 mb-8 max-w-xl">
                    Powered by Gemini AI. Enter a topic (e.g., "Plastic", "School Garden", "Water") and get a custom sustainability project plan aligned with Qatar National Vision 2030.
                  </p>

                  <div className="flex flex-col sm:flex-row gap-3 mb-8">
                    <input 
                      type="text" 
                      value={prompt}
                      onChange={(e) => setPrompt(e.target.value)}
                      placeholder="Enter a topic (e.g., Food Waste)..."
                      className="flex-grow px-5 py-4 rounded-xl bg-white/10 border border-white/10 focus:border-emerald-500 focus:bg-white/20 outline-none transition-all placeholder:text-emerald-200/50 text-white backdrop-blur-md"
                      onKeyDown={(e) => e.key === 'Enter' && generateIdea()}
                    />
                    <button 
                      onClick={generateIdea}
                      disabled={loading || !prompt.trim()}
                      className="px-8 py-4 bg-emerald-600 hover:bg-emerald-500 disabled:bg-emerald-800/50 disabled:cursor-not-allowed rounded-xl font-bold transition-all shadow-lg shadow-emerald-900/50 flex items-center justify-center gap-2 min-w-[160px]"
                    >
                      {loading ? <Loader2 className="animate-spin" /> : <><Sparkles size={18} /> Generate</>}
                    </button>
                  </div>

                  {error && (
                     <div className="p-4 bg-red-500/10 border border-red-500/30 rounded-xl text-red-200 text-sm mb-6">
                       {error}
                     </div>
                  )}

                  {idea && (
                    <div className="bg-white/5 backdrop-blur-md rounded-2xl p-6 border border-white/10 animate-in fade-in slide-in-from-bottom-4">

        const AIQuizSection = () => {
          const [quizData, setQuizData] = useState(null);
          const [loading, setLoading] = useState(false);
          const [selectedIdx, setSelectedIdx] = useState(null);
          const [showResult, setShowResult] = useState(false);

          useEffect(() => {
            fetchQuestion();
          }, []);

          const fetchQuestion = async () => {
            setLoading(true);
            setQuizData(null);
            setSelectedIdx(null);
            setShowResult(false);
            
            // --- IMPORTANT: INSERT YOUR KEY HERE ---
            const apiKey = ""; // <--- INSERT YOUR GEMINI API KEY HERE
            
            if (!apiKey) {
                // If missing, we'll just stop (error handled in Idea Generator logs for user)
                setLoading(false);
                return;
            }

            try {
              const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    contents: [{ 
                      parts: [{ 
                        text: `Generate a multiple-choice question about environmental sustainability, recycling, climate change, or Qatar's local ecology (e.g. mangroves, desert, or QNV 2030). 
                        Format as JSON: { "question": "string", "options": ["string", "string", "string", "string"], "correctIndex": number (0-3), "explanation": "short string" }.
                        Ensure the question is engaging for students.` 
                      }] 
                    }],
                    generationConfig: { responseMimeType: "application/json" }
                  })
                }
              );
              if (!response.ok) throw new Error("API Error");
              const data = await response.json();
              const content = JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text || "{}");
              setQuizData(content);
            } catch (e) {
              console.error(e);
            } finally {
              setLoading(false);
            }
          };

          const handleSelect = (idx) => {
            if (showResult) return;
            setSelectedIdx(idx);
            setShowResult(true);
          };

          return (
            <section className="py-12 px-4 max-w-4xl mx-auto">
               <div className="bg-white dark:bg-slate-800 rounded-3xl p-8 border border-slate-200 dark:border-slate-700 shadow-xl relative overflow-hidden">
                  <div className="absolute top-0 right-0 p-4 opacity-10">
                     <BrainCircuit size={120} className="text-emerald-500" />
                  </div>

                  <div className="relative z-10">
                    <div className="flex justify-between items-center mb-6">
                       <h2 className="text-2xl font-bold flex items-center gap-2">
                         <span className="bg-emerald-100 dark:bg-emerald-900/50 p-2 rounded-lg text-emerald-600 dark:text-emerald-400"><BrainCircuit size={24}/></span>
                         AI Sustainability Quiz
                       </h2>
                       <button 
                         onClick={fetchQuestion} 
                         disabled={loading}
                         className="text-sm font-medium text-slate-500 hover:text-emerald-600 flex items-center gap-1 transition-colors disabled:opacity-50"
                       >
                         <RefreshCw size={16} className={loading ? "animate-spin" : ""} /> Skip
                       </button>
                    </div>

                    {loading ? (
                       <div className="h-64 flex flex-col items-center justify-center text-slate-400">
                          <Loader2 className="animate-spin mb-2" size={32} />
                          <p className="text-sm">Generating a unique question...</p>
                       </div>
                    ) : quizData ? (
                       <div className="animate-in fade-in slide-in-from-right-4 duration-300">
                          <h3 className="text-xl font-bold mb-6 leading-relaxed text-slate-800 dark:text-white">
                            {quizData.question}
                          </h3>
                          
                          <div className="grid gap-3 mb-6">
                            {quizData.options?.map((opt, idx) => {
                              let btnClass = "p-4 rounded-xl border-2 text-left font-medium transition-all duration-200 ";
                              
                              if (showResult) {
                                 if (idx === quizData.correctIndex) btnClass += "border-emerald-500 bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-300";
                                 else if (idx === selectedIdx) btnClass += "border-red-500 bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-300";
                                 else btnClass += "border-slate-100 dark:border-slate-700 opacity-50";
                              } else {
                                 btnClass += "border-slate-100 dark:border-slate-700 hover:border-emerald-400 hover:bg-emerald-50 dark:hover:bg-slate-700";
                              }

                              return (
                                <button 
                                  key={idx}
                                  onClick={() => handleSelect(idx)}
                                  disabled={showResult}
                                  className={btnClass}
                                >
                                  <span className="inline-block w-6 font-bold opacity-50 mr-2">{String.fromCharCode(65 + idx)}.</span>
                                  {opt}
                                  {showResult && idx === quizData.correctIndex && <CheckCircle2 className="inline-block ml-2 text-emerald-500" size={16}/>}
                                  {showResult && idx === selectedIdx && idx !== quizData.correctIndex && <AlertCircle className="inline-block ml-2 text-red-500" size={16}/>}
                                </button>
                              )
                            })}
                          </div>

                          {showResult && (
                            <div className="bg-emerald-100 dark:bg-emerald-900/30 p-4 rounded-xl border border-emerald-200 dark:border-emerald-800/50 animate-in zoom-in-95">
                               <h4 className="font-bold text-emerald-800 dark:text-emerald-200 mb-1 flex items-center gap-2">
                                 <Lightbulb size={16} /> Did you know?
                               </h4>
                               <p className="text-sm text-emerald-900/80 dark:text-emerald-100/80">
                                 {quizData.explanation}
                               </p>
                               <button 
                                 onClick={fetchQuestion}
                                 className="mt-4 px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm font-bold hover:bg-emerald-700 transition-colors"
                               >
                                 Next Question
                               </button>
                            </div>
                          )}
                       </div>
                    ) : (
                       <div className="text-center py-12 text-slate-500">
                         {loading ? "Loading..." : "Failed to load quiz. Please check API Key in code."}
                       </div>
                    )}
                  </div>
               </div>
            </section>
          );
        };

              <div className="relative w-72 h-72 md:w-96 md:h-96 flex items-center justify-center">
                <div className="absolute inset-0 border border-emerald-500/20 rounded-full animate-spin-slow"></div>
                <div className="absolute inset-4 border border-dashed border-emerald-500/20 rounded-full animate-spin-reverse"></div>
                <div className="absolute inset-12 bg-emerald-500/5 rounded-full blur-2xl animate-pulse"></div>

                <div className="relative z-10 text-center transform transition-all duration-500 hover:scale-105">
                  <div className="flex items-center justify-center gap-2 mb-2 opacity-80">
                     <div className="h-[1px] w-8 bg-emerald-500"></div>
                     <span className="text-xs font-bold tracking-[0.3em] uppercase text-slate-500 dark:text-emerald-400">Qatar</span>

        function App() {

          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

          useEffect(() => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
              setDarkMode(true);
              document.documentElement.classList.add('dark');
            } else {
              document.documentElement.classList.remove('dark');
            }
          }, []);

          const toggleTheme = () => {
            setDarkMode(!darkMode);
            if (!darkMode) {
              document.documentElement.classList.add('dark');
              localStorage.setItem('theme', 'dark');
            } else {
              document.documentElement.classList.remove('dark');
              localStorage.setItem('theme', 'light');
            }
          };

          const toggleLang = () => {
            const newLang = lang === 'en' ? 'ar' : 'en';
            setLang(newLang);
            document.documentElement.dir = newLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = newLang;
          };

          const t = TRANSLATIONS[lang];

                            {lang === 'en' ? 'AR' : 'EN'}
                          </button>
                          <button onClick={toggleTheme} className="p-1 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
                            {darkMode ? <Sun size={20} /> : <Moon size={20} />}
                          </button>
                        </div>
                      </div>
                    </div>
                    <div className="-mr-2 flex md:hidden">
                      <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-2 rounded-md hover:text-emerald-500 focus:outline-none">
                        {isMobileMenuOpen ? <X size={24} /> : <Menu size={24} />}
                      </button>
                    </div>
                  </div>
                </div>
                {isMobileMenuOpen && (
                  <div className="md:hidden border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
                    <div className="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                      <button onClick={() => { setCurrentPage('home'); setIsMobileMenuOpen(false); }} className="block w-full text-left px-3 py-2 rounded-md text-base font-medium hover:bg-emerald-50 dark:hover:bg-slate-800">{t.nav.home}</button>
                      <button onClick={() => { setCurrentPage('accomplishments'); setIsMobileMenuOpen(false); }} className="block w-full text-left px-3 py-2 rounded-md text-base font-medium hover:bg-emerald-50 dark:hover:bg-slate-800">{t.nav.accomplishments}</button>
                      <button onClick={() => { setCurrentPage('contact'); setIsMobileMenuOpen(false); }} className="block w-full text-left px-3 py-2 rounded-md text-base font-medium hover:bg-emerald-50 dark:hover:bg-slate-800">{t.nav.contact}</button>
                      <div className="flex items-center space-x-4 px-3 py-2 mt-4 border-t border-slate-100 dark:border-slate-800 pt-4">
                        <button onClick={toggleLang} className="font-bold">{lang === 'en' ? 'Arabic' : 'English'}</button>
                        <button onClick={toggleTheme}>{darkMode ? 'Light Mode' : 'Dark Mode'}</button>
                      </div>
                    </div>
                  </div>
                )}
              </nav>

              <main className="pt-16">
                {currentPage === 'home' ? (
                  <HomePage t={t} lang={lang} setCurrentPage={setCurrentPage} />
                ) : currentPage === 'accomplishments' ? (
                  <AccomplishmentsPage t={t} lang={lang} />
                ) : (
                  <ContactPage t={t} lang={lang} />
                )}
              </main>

              <footer className={`py-12 mt-12 border-t ${darkMode ? 'bg-slate-900 border-slate-800' : 'bg-slate-50 border-slate-200'}`}>
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex flex-col md:flex-row justify-between items-center">
                    <div className="mb-4 md:mb-0">
                      <span className="font-bold text-lg text-emerald-600">EcoAwareness.qa</span>
                      <p className="text-sm text-slate-500 mt-1">{t.footer.rights}</p>
                    </div>
                    <div className="flex space-x-6 rtl:space-x-reverse">
                      <a href="https://www.instagram.com/ecoawareness.qa/" target="_blank" rel="noopener noreferrer" className="text-slate-400 hover:text-emerald-500 transition-colors">
                        <Instagram size={24} />
                        <span className="sr-only">Instagram</span>
                      </a>
                      <a href="mailto:ecoawarenessme@gmail.com" className="text-slate-400 hover:text-emerald-500 transition-colors">
                        <Mail size={24} />
                        <span className="sr-only">Email</span>
                      </a>
                    </div>
                  </div>
                </div>
              </footer>
            </div>
          );
        }

        // --- RENDER ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
