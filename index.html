                extend: {

                    animation: {
                        'spin-slow': 'spin 12s linear infinite',
                        'spin-reverse': 'spin-reverse 15s linear infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'marquee': 'marquee 30s linear infinite',
                        'gradient-x': 'gradient-x 3s ease infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },

                        marquee: {
                            '0%': { transform: 'translateX(0)' },

                        'gradient-x': {
                            '0%, 100%': {

                            '50%': {
                                'background-size': '200% 200%',

        };

        // --- DATA ---
        const DATA = {
          leadership: [
            { id: "mohammed", name: "Mohammed Elfatih", role: "Founder & CEO", image: "./assets/elfatihh.jpg", bio: "As the visionary founder, Mohammed orchestrates the strategic direction of Qatar's leading youth climate initiative." },

            { id: 2, type: "Media", title: "Featured in Doha News", date: "Dec 2023", image: "https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=600&fit=crop", desc: "Our initiative was highlighted as a leading youth movement." },
            { id: 3, type: "AI", title: "EcoBot AI", date: "Coming Soon", image: "https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=600&fit=crop", desc: "Our AI recycling assistant is currently in development." }
          ]
        };

        const TRANSLATIONS = {
          en: {
            nav: { home: "Home", about: "About Us", accomplishments: "Accomplishments", contact: "Contact" },
            hero: { 
              headline: "Empowering the Youth for a Sustainable Future",

            about: {

              story_title: "Our Story",

              story_text2: "In Grade 11, we took decisive action, turning our concepts into concrete projects. We believe that true leadership starts with taking initiative and responsibility for our shared future.",
              steps_title: "Our First Steps",
              steps_text: "Our journey started in Education City, where we began creating and distributing educational climate-awareness videos. These early campaigns laid the foundation for our ongoing mission.",

              more_work_text: "To see more of our awareness videos, campaigns, and daily updates, visit our Instagram page.",
              instagram_btn: "Visit Instagram",

            },
            impact: { title: "Our Impact", filter_all: "All", future_title: "The Roadmap", milestone: "Next Milestone: Develop AI solution for sustainable education." },

          },

            hero: { headline: "تمكين الشباب لمستقبل مستدام", subhead: "مبادرة شبابية لزيادة الوعي المناخي لطلاب المدارس الثانوية والجامعات في قطر." },
            team: { title: "المؤسسون والقيادة", view_bio: "اقرأ المزيد", join_us: "انضم إلينا" },
            about: {

              steps_title: "خطواتنا الأولى",
              steps_text: "بدأت رحلتنا في المدينة التعليمية، حيث بدأنا في إنشاء وتوزيع مقاطع فيديو تعليمية.",

            },
            impact: { title: "تأثيرنا", filter_all: "الكل", future_title: "خارطة الطريق", milestone: "الهدف القادم: تطوير حل ذكاء اصطناعي للتعليم المستدام." },
            contact: { title: "تواصل معنا", subtitle: "إذا كنت ترغب في الانضمام إلى فريقنا وإحداث تغيير إيجابي، أرسل لنا بريدًا إلكترونيًا يتضمن سيرتك الذاتية وسنرد عليك قريبًا." }
          }
        };

        // --- COMPONENTS ---
        const AIIdeaGenerator = () => {
          const [prompt, setPrompt] = useState('');
          const [idea, setIdea] = useState(null);
          const [loading, setLoading] = useState(false);
          const [error, setError] = useState('');

          const generateIdea = async () => {
            if (!prompt.trim()) return;
            setLoading(true); setError(''); setIdea(null);
            const apiKey = ""; // API key logic here

            try {
              const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: `Act as a sustainability expert for a youth organization in Qatar. Generate a creative, actionable "Mini-Project" idea based on this topic: "${prompt}". Formatted as JSON with keys: "title", "objective", "steps" (an array of 3 short strings), and "visionAlignment" (how it aligns with QNV 2030). Keep it short.` }] }],
                    generationConfig: { responseMimeType: "application/json" }
                  })
                }
              );
              if (!response.ok) throw new Error("API Error");
              const data = await response.json();
              const content = JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text || "{}");
              setIdea(content);
            } catch (err) {
              setError("Unable to generate ideas right now. Please try again.");
            } finally {
              setLoading(false);
            }
          };

          return (
            <div className="py-12 px-4 max-w-4xl mx-auto">
              <div className="bg-white/40 dark:bg-slate-900/40 backdrop-blur-xl rounded-[2.5rem] p-8 md:p-12 border border-white/60 dark:border-slate-700/50 shadow-2xl relative overflow-hidden group transition-all duration-500 ease-apple">
                <div className="absolute -top-24 -right-24 w-64 h-64 bg-emerald-400/20 rounded-full blur-3xl group-hover:bg-emerald-400/30 transition-colors duration-700 pointer-events-none"></div>
                <div className="absolute -bottom-24 -left-24 w-64 h-64 bg-teal-400/20 rounded-full blur-3xl group-hover:bg-teal-400/30 transition-colors duration-700 pointer-events-none"></div>
                
                <div className="relative z-10">
                  <h2 className="text-2xl md:text-3xl font-bold flex items-center gap-3 mb-4 text-slate-800 dark:text-white">
                    <div className="p-2 bg-emerald-100 dark:bg-emerald-900/40 rounded-xl"><Icon path={Icons.Sparkles} className="text-emerald-500" size={24} /></div>
                    Eco-Innovation Lab
                  </h2>
                  <p className="mb-8 text-slate-600 dark:text-slate-300">Enter a topic (e.g., "Plastic", "Water") to get a random student project idea aligned with QNV 2030.</p>
                  
                  <div className="flex flex-col sm:flex-row gap-4 mb-8">
                    <input 
                      type="text" 
                      value={prompt}
                      onChange={(e) => setPrompt(e.target.value)}
                      placeholder="Enter a topic..."
                      className="flex-grow px-6 py-4 rounded-2xl bg-white/60 dark:bg-slate-800/60 border border-white/50 dark:border-slate-600/50 focus:border-emerald-500 outline-none transition-all placeholder:text-slate-400 dark:text-white backdrop-blur-md shadow-inner text-lg"
                      onKeyDown={(e) => e.key === 'Enter' && generateIdea()}
                    />
                    <button 
                      onClick={generateIdea}
                      disabled={loading || !prompt.trim()}
                      className="px-8 py-4 bg-slate-900 dark:bg-emerald-600 text-white disabled:opacity-50 rounded-2xl font-bold transition-all duration-500 ease-apple active:scale-95 shadow-lg hover:shadow-xl flex items-center justify-center gap-2"
                    >
                      {loading ? <Icon path={Icons.Loader2} className="animate-spin" size={20} /> : <><Icon path={Icons.Bot} size={20} /> Generate</>}
                    </button>
                  </div>

                  {error && <div className="p-4 bg-red-100 dark:bg-red-900/20 text-red-600 dark:text-red-300 rounded-xl text-sm mb-6">{error}</div>}

                  {idea && (
                    <div className="bg-white/80 dark:bg-slate-800/80 backdrop-blur-md p-8 rounded-3xl border border-white/50 dark:border-slate-600/50 animate-in fade-in slide-in-from-bottom-4 duration-500 ease-apple shadow-sm">
                      <h3 className="text-2xl font-black text-emerald-700 dark:text-emerald-400 mb-3">{idea.title}</h3>
                      <p className="italic text-slate-700 dark:text-slate-300 mb-6 text-lg">"{idea.objective}"</p>
                      <ul className="space-y-3 mb-6">
                        {idea.steps?.map((step, idx) => (
                          <li key={idx} className="text-base flex items-start gap-3 text-slate-800 dark:text-slate-200">
                            <span className="w-6 h-6 rounded-full bg-emerald-100 dark:bg-emerald-900/50 text-emerald-600 dark:text-emerald-400 flex items-center justify-center text-xs font-bold flex-shrink-0 mt-0.5">{idx + 1}</span> 
                            {step}
                          </li>
                        ))}
                      </ul>
                      <div className="text-sm bg-emerald-50 dark:bg-emerald-900/30 p-4 rounded-2xl border border-emerald-200 dark:border-emerald-800/50 text-emerald-800 dark:text-emerald-200 font-medium flex items-start gap-2">
                        <Icon path={Icons.Award} className="flex-shrink-0 mt-0.5" size={16} /> <span><strong>QNV 2030:</strong> {idea.visionAlignment}</span>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        };

        const AIQuizSection = () => {
          const [quizData, setQuizData] = useState(null);
          const [loading, setLoading] = useState(false);
          const [selectedIdx, setSelectedIdx] = useState(null);
          const [showResult, setShowResult] = useState(false);

          useEffect(() => { fetchQuestion(); }, []);

          const fetchQuestion = async () => {
            setLoading(true); setQuizData(null); setSelectedIdx(null); setShowResult(false);
            const apiKey = ""; // API Key
            try {
              const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: `Generate a multiple-choice question about environmental sustainability or Qatar's local ecology. Format as JSON: { "question": "string", "options": ["string", "string", "string", "string"], "correctIndex": number (0-3), "explanation": "short string" }.` }] }],
                    generationConfig: { responseMimeType: "application/json" }
                  })
                }
              );
              if (!response.ok) throw new Error("API Error");
              const data = await response.json();
              const content = JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text || "{}");
              setQuizData(content);
            } catch (e) {
              console.error(e);
            } finally {
              setLoading(false);
            }
          };

          const handleSelect = (idx) => {
            if (showResult) return;
            setSelectedIdx(idx);
            setShowResult(true);
          };

          return (
            <div className="max-w-4xl mx-auto px-4 py-8 mb-12">
              <div className="bg-white/40 dark:bg-slate-900/40 backdrop-blur-xl rounded-[2.5rem] p-8 md:p-12 border border-white/60 dark:border-slate-700/50 shadow-2xl relative overflow-hidden group transition-all duration-500 ease-apple">
                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-blue-400/5 dark:bg-blue-400/10 rounded-full blur-3xl pointer-events-none transition-all duration-700 group-hover:scale-110"></div>
                <div className="relative z-10">
                  <div className="flex justify-between items-center mb-8">
                    <h2 className="text-2xl md:text-3xl font-bold flex items-center gap-3 text-slate-800 dark:text-white">
                      <div className="p-2 bg-blue-100 dark:bg-blue-900/40 rounded-xl"><Icon path={Icons.BrainCircuit} className="text-blue-500" size={24}/></div>
                      Sustainability Quiz
                    </h2>
                    <button onClick={fetchQuestion} disabled={loading} className="text-sm font-bold text-slate-500 hover:text-emerald-600 flex items-center gap-2 transition-colors active:scale-95 duration-300 ease-apple bg-white/50 dark:bg-slate-800/50 px-4 py-2 rounded-full shadow-sm">
                      <Icon path={Icons.RefreshCw} size={16} className={loading ? "animate-spin" : ""} /> Skip
                    </button>
                  </div>

                  {loading ? (
                     <div className="h-64 flex flex-col items-center justify-center text-slate-400">
                        <Icon path={Icons.Loader2} className="animate-spin mb-4 text-emerald-500" size={40} />
                        <p className="font-medium">Generating question...</p>
                     </div>
                  ) : quizData ? (
                     <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 ease-apple">
                        <h3 className="text-xl md:text-2xl font-black mb-8 leading-relaxed text-slate-800 dark:text-white">
                          {quizData.question}
                        </h3>
                        <div className="grid gap-4 mb-6 relative z-10">
                          {quizData.options?.map((opt, idx) => {
                            let btnClass = "p-5 rounded-2xl border-2 text-left font-semibold text-lg transition-all duration-300 ease-apple active:scale-[0.98] ";
                            if (showResult) {
                               if (idx === quizData.correctIndex) btnClass += "border-emerald-500 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-900 dark:text-emerald-100 shadow-[0_0_20px_rgba(16,185,129,0.2)]";
                               else if (idx === selectedIdx) btnClass += "border-red-500 bg-red-50 dark:bg-red-900/30 text-red-700 dark:text-red-300";
                               else btnClass += "border-slate-200 dark:border-slate-700 opacity-40";
                            } else {
                               btnClass += "border-white dark:border-slate-700 hover:border-emerald-400 hover:shadow-xl bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm hover:-translate-y-1";
                            }
                            return (
                              <button key={idx} onClick={() => handleSelect(idx)} disabled={showResult} className={btnClass}>
                                <span className="inline-block w-8 font-black opacity-30 mr-2 text-xl">{String.fromCharCode(65 + idx)}.</span>
                                {opt}
                                {showResult && idx === quizData.correctIndex && <span className="float-right text-emerald-500 mt-0.5"><Icon path={Icons.CheckCircle2} size={24}/></span>}
