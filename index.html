                                        <section className="bg-gradient-to-br from-emerald-50 to-teal-50 dark:from-emerald-900/20 dark:to-teal-900/20 rounded-[3rem] p-10 md:p-16 border border-emerald-100/50 dark:border-emerald-800/30 shadow-lg hover:shadow-xl transition-shadow duration-500">
                                            <div className="flex flex-col md:flex-row gap-12 items-center">
                                                <div className="flex-grow">
                                                    <h3 className="text-3xl font-black mb-6 flex items-center gap-4">
                                                        <div className="p-3 bg-white dark:bg-slate-800 rounded-2xl shadow-sm"><Icon path={Icons.Leaf} className="text-emerald-600" size={32} /></div>
                                                        {t.acc.paperless_title}
                                                    </h3>
                                                    <p className="text-slate-700 dark:text-slate-300 leading-relaxed text-xl font-light">
                                                        {t.acc.paperless_desc}
                                                    </p>
                                                </div>
                                                <div className="md:w-1/3 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md p-8 rounded-[2rem] shadow-xl border border-white dark:border-slate-700 w-full hover:scale-105 transition-transform duration-500 ease-apple">
                                                    <h4 className="font-black mb-6 text-sm text-slate-400 uppercase tracking-widest border-b border-slate-100 dark:border-slate-700 pb-2">Impact</h4>
                                                    <ul className="space-y-4">
                                                        <li className="flex items-center gap-3 text-base font-medium"><span className="flex-shrink-0 w-6 h-6 rounded-full bg-emerald-100 dark:bg-emerald-900 flex items-center justify-center text-emerald-600 text-xs font-bold">✓</span> Reduced waste 40%</li>
                                                        <li className="flex items-center gap-3 text-base font-medium"><span className="flex-shrink-0 w-6 h-6 rounded-full bg-emerald-100 dark:bg-emerald-900 flex items-center justify-center text-emerald-600 text-xs font-bold">✓</span> 3 major schools</li>
                                                        <li className="flex items-center gap-3 text-base font-medium"><span className="flex-shrink-0 w-6 h-6 rounded-full bg-emerald-100 dark:bg-emerald-900 flex items-center justify-center text-emerald-600 text-xs font-bold">✓</span> Full participation</li>
                                                    </ul>
                                                </div>
                                            </div>
                                        </section>

                                        {/* 4. Sustainable Crafting & Circular Economy */}
                                        <section className="grid md:grid-cols-2 gap-16 items-center">
                                            <div className="order-2 md:order-1 relative h-72 md:h-96 rounded-[3rem] overflow-hidden shadow-2xl group">
                                                <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=800&fit=crop')] bg-cover bg-center transition-transform duration-1000 ease-apple group-hover:scale-110"></div>
                                                <div className="absolute inset-0 bg-black/10 group-hover:bg-black/0 transition-colors duration-500"></div>
                                            </div>
                                            <div className="order-1 md:order-2 group">
                                                <div className="w-14 h-14 bg-orange-100 dark:bg-orange-900/30 rounded-2xl flex items-center justify-center text-orange-600 mb-8 group-hover:scale-110 group-hover:-rotate-6 transition-all duration-500 ease-apple shadow-sm">
                                                    <Icon path={Icons.Recycle} size={32} />
                                                </div>
                                                <h2 className="text-4xl font-black mb-6">{t.acc.crafting_title}</h2>
                                                <p className="text-xl text-slate-600 dark:text-slate-300 leading-relaxed font-light">
                                                    {t.acc.crafting_desc}
                                                </p>
                                            </div>
                                        </section>

                                        {/* 6. Institutional Recognition */}
                                        <section className="grid md:grid-cols-3 gap-8 pt-8">
                                            <div className="md:col-span-1 bg-slate-900 text-white p-10 rounded-[2.5rem] flex flex-col justify-between shadow-2xl hover:-translate-y-2 transition-transform duration-500 ease-apple">
                                                <Icon path={Icons.Award} size={56} className="text-yellow-400 mb-6 drop-shadow-md" />
                                                <div>
                                                    <h3 className="text-2xl font-black mb-4 leading-tight">{t.acc.recog_title}</h3>
                                                    <div className="h-1.5 w-16 bg-yellow-400 rounded-full"></div>
                                                </div>
                                            </div>
                                            <div className="md:col-span-2 bg-white dark:bg-slate-800 p-10 rounded-[2.5rem] border border-slate-100 dark:border-slate-700 flex items-center shadow-lg hover:shadow-xl transition-shadow duration-500">
                                                <p className="text-xl text-slate-600 dark:text-slate-300 leading-relaxed font-light">
                                                    {t.acc.recog_desc}
                                                </p>
                                            </div>
                                        </section>

                                        {/* 7. Alignment with QNV 2030 */}
                                        <section className="bg-gradient-to-br from-emerald-900 via-teal-900 to-slate-900 text-white rounded-[3rem] p-12 md:p-20 text-center relative overflow-hidden shadow-2xl">
                                            <div className="absolute top-0 right-0 w-96 h-96 bg-emerald-500/20 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2 animate-float"></div>
                                            <div className="absolute bottom-0 left-0 w-96 h-96 bg-teal-500/20 rounded-full blur-3xl translate-y-1/2 -translate-x-1/2 animate-float" style={{animationDelay: '3s'}}></div>
                                            <div className="relative z-10">
                                                <div className="inline-block p-4 bg-white/10 rounded-2xl mb-8 backdrop-blur-md shadow-lg border border-white/10">
                                                    <Icon path={Icons.Globe} className="text-emerald-300" size={40} />
                                                </div>
                                                <h2 className="text-4xl md:text-5xl font-black mb-8">{t.acc.qnv_title}</h2>
                                                <p className="text-xl md:text-2xl text-emerald-50/90 max-w-3xl mx-auto leading-relaxed font-light">
                                                    {t.acc.qnv_desc}
                                                </p>
                                            </div>
                                        </section>

                                        {/* 8. Looking Ahead */}
                                        <section className="text-center py-16">
                                            <h2 className="text-sm font-black mb-6 text-slate-400 uppercase tracking-[0.3em]">{t.acc.future_title}</h2>
                                            <p className="text-2xl md:text-3xl font-medium max-w-4xl mx-auto leading-relaxed bg-clip-text text-transparent bg-gradient-to-r from-slate-800 to-slate-500 dark:from-white dark:to-slate-400">
                                                "{t.acc.future_desc}"
                                            </p>
                                        </section>

                                    </div>
                                </div>
                            )}

                            {page === 'contact' && (
                                <div className="max-w-4xl mx-auto px-4 py-24 text-center">
                                    <h1 className="text-5xl font-black mb-6">{t.contact.title}</h1>
                                    <p className="text-xl text-slate-600 dark:text-slate-400 mb-16 max-w-2xl mx-auto leading-relaxed font-light">{t.contact.subtitle}</p>
                                    <div className="grid md:grid-cols-2 gap-8">
                                        <div className="bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl p-10 rounded-[3rem] border border-white dark:border-slate-700 shadow-2xl flex flex-col items-center hover:scale-105 active:scale-95 transition-all duration-500 ease-apple group">
                                            <div className="w-20 h-20 bg-emerald-100 dark:bg-emerald-900/40 rounded-[2rem] flex items-center justify-center text-emerald-600 mb-8 group-hover:-translate-y-2 group-hover:shadow-lg transition-all duration-500 ease-apple border border-emerald-200 dark:border-emerald-800/50"><Icon path={Icons.Mail} size={40} /></div>
                                            <h3 className="text-2xl font-black mb-6">Email</h3>
                                            <a href="mailto:ecoawarenessme@gmail.com" className="px-8 py-4 bg-emerald-600 text-white rounded-full font-bold flex items-center gap-3 shadow-lg hover:shadow-emerald-600/30 transition-shadow">
                                                <Icon path={Icons.Send} size={20} /> Email Us
                                            </a>
                                        </div>
                                        <div className="bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl p-10 rounded-[3rem] border border-white dark:border-slate-700 shadow-2xl flex flex-col items-center hover:scale-105 active:scale-95 transition-all duration-500 ease-apple group">
                                            <div className="w-20 h-20 bg-pink-100 dark:bg-pink-900/40 rounded-[2rem] flex items-center justify-center text-pink-600 mb-8 group-hover:-translate-y-2 group-hover:shadow-lg transition-all duration-500 ease-apple border border-pink-200 dark:border-pink-800/50"><Icon path={Icons.Instagram} size={40} /></div>
                                            <h3 className="text-2xl font-black mb-6">Instagram</h3>
                                            <a href="https://www.instagram.com/ecoawareness.qa/" className="px-8 py-4 bg-gradient-to-r from-purple-500 via-pink-500 to-orange-500 text-white rounded-full font-bold flex items-center gap-3 shadow-lg hover:shadow-pink-500/30 transition-shadow">
                                                <Icon path={Icons.Instagram} size={20} /> Follow Us
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* APPLE-STYLE BIO MODAL */}
                    {selectedBio && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/30 dark:bg-slate-900/60 backdrop-blur-xl animate-in fade-in duration-500 ease-apple" onClick={() => setSelectedBio(null)}>
                            <div className="bg-white/90 dark:bg-slate-800/90 backdrop-blur-2xl max-w-lg w-full rounded-[3rem] p-10 relative shadow-2xl animate-in zoom-in-[0.90] slide-in-from-bottom-8 duration-500 ease-apple border border-white/40 dark:border-slate-700/50" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setSelectedBio(null)} className="absolute top-6 right-6 p-3 bg-slate-100 dark:bg-slate-700 rounded-full hover:bg-slate-200 dark:hover:bg-slate-600 active:scale-90 transition-all duration-300 ease-apple"><Icon path={Icons.X} size={20} /></button>
                                <div className="flex flex-col md:flex-row items-center md:items-start gap-6 mb-8 text-center md:text-left">
                                    <img src={selectedBio.image} className="w-28 h-28 rounded-[2rem] object-cover shadow-lg border-4 border-white dark:border-slate-700" />
                                    <div className="mt-2 md:mt-4">
                                        <h3 className="text-3xl font-black">{selectedBio.name}</h3>
                                        <p className="text-emerald-600 font-bold text-lg mt-1">{selectedBio.role}</p>
                                    </div>
                                </div>
                                <div className="w-12 h-1.5 bg-emerald-500 rounded-full mb-6 mx-auto md:mx-0"></div>
                                <p className="text-slate-600 dark:text-slate-300 leading-relaxed text-lg font-light">{selectedBio.bio}</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
