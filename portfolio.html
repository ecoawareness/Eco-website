<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoHub Climate Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --ink:#0a0a0a; --paper:#f5f0e8; --green:#1a5c38; --lime:#a8e063; --sand:#e8dfc8; --rust:#c4622d; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { min-height:100vh; background:var(--paper); color:var(--ink); font-family:'DM Sans',sans-serif; }
        .wrap { width:min(1060px, calc(100% - 2rem)); margin:0 auto; padding:2rem 0 3rem; }
        .top { display:flex; justify-content:space-between; align-items:center; gap:1rem; margin-bottom:2rem; }
        .brand { display:flex; align-items:center; gap:.65rem; color:var(--green); text-decoration:none; font-weight:700; }
        .mark { width:36px; height:36px; border-radius:9px; background:var(--green); color:white; display:grid; place-items:center; font-family:'Instrument Serif',serif; font-size:1.45rem; }
        .back { color:rgba(0,0,0,.55); text-decoration:none; font-size:.9rem; }
        .hero { display:grid; grid-template-columns:1.1fr .9fr; gap:1.5rem; align-items:stretch; }
        .panel { background:white; border:1px solid rgba(0,0,0,.08); border-radius:16px; padding:1.5rem; box-shadow:0 18px 60px rgba(0,0,0,.06); }
        .identity { background:var(--green); color:white; border-radius:18px; padding:2rem; position:relative; overflow:hidden; min-height:360px; display:flex; flex-direction:column; justify-content:space-between; }
        .identity::after { content:""; position:absolute; inset:auto -12% -20% 35%; height:220px; background:radial-gradient(circle, rgba(168,224,99,.24), transparent 64%); }
        .eyebrow { color:var(--lime); text-transform:uppercase; letter-spacing:.12em; font-size:.72rem; margin-bottom:1.2rem; }
        h1 { font-family:'Instrument Serif',serif; font-size:clamp(3rem,7vw,5.8rem); line-height:.95; max-width:780px; }
        .bio { color:rgba(255,255,255,.72); line-height:1.7; max-width:560px; margin-top:1.2rem; }
        .member { display:flex; flex-wrap:wrap; gap:.7rem; position:relative; z-index:1; }
        .pill { border:1px solid rgba(255,255,255,.18); background:rgba(255,255,255,.08); border-radius:100px; padding:.5rem .8rem; font-size:.82rem; color:rgba(255,255,255,.82); }
        .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:.75rem; margin-bottom:1rem; }
        .stat { background:var(--paper); border-radius:12px; padding:1rem; }
        .num { font-family:'Instrument Serif',serif; color:var(--green); font-size:2rem; line-height:1; }
        .label { color:rgba(0,0,0,.48); font-size:.76rem; margin-top:.25rem; }
        h2 { font-family:'Instrument Serif',serif; font-size:1.45rem; margin-bottom:.75rem; }
        .event { padding:.9rem 0; border-top:1px solid rgba(0,0,0,.07); }
        .event:first-of-type { border-top:0; }
        .event-title { font-weight:500; margin-bottom:.2rem; }
        .event-meta { color:rgba(0,0,0,.48); font-size:.82rem; }
        .empty { color:rgba(0,0,0,.45); line-height:1.6; }
        .skills { display:flex; gap:.45rem; flex-wrap:wrap; margin-top:.8rem; }
        .skill { background:rgba(26,92,56,.09); color:var(--green); border-radius:999px; padding:.35rem .65rem; font-size:.78rem; }
        @media (max-width: 820px) { .hero { grid-template-columns:1fr; } .stats { grid-template-columns:1fr; } .identity { min-height:320px; } }
    </style>
</head>
<body>
    <main class="wrap">
        <div class="top">
            <a class="brand" href="index.html"><span class="mark">E</span><span>EcoAwareness</span></a>
            <a class="back" href="dashboard.html">Dashboard</a>
        </div>
        <section class="hero">
            <article class="identity">
                <div>
                    <div class="eyebrow">Climate Portfolio</div>
                    <h1 id="portfolio-name">EcoHub Member</h1>
                    <p class="bio" id="portfolio-bio">Verified participation, climate interests, and community impact in one shareable profile.</p>
                </div>
                <div class="member">
                    <span class="pill" id="portfolio-id">ECO-MEMBER</span>
                    <span class="pill" id="portfolio-location">Qatar</span>
                </div>
            </article>
            <aside class="panel">
                <div class="stats">
                    <div class="stat"><div class="num" id="stat-hours">0</div><div class="label">Verified hours</div></div>
                    <div class="stat"><div class="num" id="stat-events">0</div><div class="label">Events</div></div>
                    <div class="stat"><div class="num" id="stat-certificates">0</div><div class="label">Certificates</div></div>
                </div>
                <h2>Skills & Interests</h2>
                <div class="skills" id="portfolio-skills"></div>
            </aside>
        </section>
        <section class="panel" style="margin-top:1rem">
            <h2>Recent Impact</h2>
            <div id="portfolio-events"><p class="empty">No public event history yet.</p></div>
        </section>
    </main>
    <script>
        const SUPABASE_URL = 'https://nqvhxjsryatqgfvtjbki.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xdmh4anNyeWF0cWdmdnRqYmtpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNDYxMDAsImV4cCI6MjA4ODYyMjEwMH0.HrnrIq5bK3FhxmHaLxWPIG0nD-CI-3ReHCoO5RL1c3M';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function memberId(id) { return 'ECO-' + String(id || 'member').replace(/-/g, '').slice(0, 8).toUpperCase(); }
        function esc(v) { return String(v || '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
        function localEvents() {
            try { return JSON.parse(localStorage.getItem('ecohub_my_events') || '[]'); } catch { return []; }
        }
        function localProfile() {
            try { return JSON.parse(localStorage.getItem('ecohub_portfolio_snapshot') || '{}'); } catch { return {}; }
        }
        function render(profile, events) {
            document.getElementById('portfolio-name').textContent = profile.full_name || 'EcoHub Member';
            document.getElementById('portfolio-bio').textContent = profile.bio || 'Verified participation, climate interests, and community impact in one shareable profile.';
            document.getElementById('portfolio-location').textContent = profile.location || 'Qatar';
            document.getElementById('portfolio-id').textContent = memberId(profile.id);
            const verified = events.reduce((sum, e) => sum + Number(e.verified_hours || 0), 0);
            document.getElementById('stat-hours').textContent = verified;
            document.getElementById('stat-events').textContent = events.length;
            document.getElementById('stat-certificates').textContent = verified >= 100 ? '1' : '0';
            const skills = [...(profile.interests || []), ...(profile.skills || [])].filter(Boolean);
            document.getElementById('portfolio-skills').innerHTML = (skills.length ? skills : ['Climate action', 'Volunteering', 'Qatar sustainability']).map(s => `<span class="skill">${esc(s)}</span>`).join('');
            document.getElementById('portfolio-events').innerHTML = events.length
                ? events.slice(0, 8).map(e => `<div class="event"><div class="event-title">${esc(e.opportunity_title || e.title)}</div><div class="event-meta">${esc(e.organization || e.org || 'EcoHub')} · ${esc(e.event_date || e.date || '')} · ${esc(e.status || 'Upcoming')}</div></div>`).join('')
                : '<p class="empty">No public event history yet.</p>';
        }
        async function load() {
            const uid = new URLSearchParams(location.search).get('uid');
            let profile = localProfile();
            let events = localEvents();
            if (uid) {
                const profileResp = await sb.from('eco_profiles').select('*').eq('id', uid).maybeSingle();
                if (profileResp.data) profile = profileResp.data;
                const eventResp = await sb.from('eco_event_signups').select('*').eq('user_id', uid).order('created_at', { ascending: false });
                if (eventResp.data) events = eventResp.data;
            }
            render(profile, events);
        }
        load();
    </script>
</body>
</html>
